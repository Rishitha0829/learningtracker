<!DOCTYPE html>
<html>
<head>
<title>Learningtracker Login </title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#eef2f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container{
    background:white;
    padding:45px;
    width:420px;
    border-radius:10px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    margin-bottom:30px;
}
.error{
    background:#ffe5e5;
    color:#d8000c;
    padding:10px;
    border-radius:6px;
    margin-bottom:15px;
    text-align:center;
}
input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}
button{
    width:100%;
    padding:12px;
    background:#2563eb;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    background:#1e40af;
}
p{
    text-align:center;
    margin-top:18px;
}
a{
    color:#2563eb;
    text-decoration:none;
    font-weight:500;
}
</style>
</head>
<body>
<div class="container">
<h2>Learningtracker Login</h2>
{% if messages %}
{% for message in messages %}
<div class="error">
{{ message }}
</div>
{% endfor %}
{% endif %}
<form method="POST">
{% csrf_token %}
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p>Don't have an account? <a href="/register/">Register</a></p>
</div>
</body>
</html>
